spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: account-service-v1
            uri: http://localhost:8081/api/v1/accounts
            predicates:
              - Path=/api/v1/accounts/**
          - id: auth-service-v1
            uri: http://localhost:8082/api/v1/auth
            predicates:
              - Path=/api/v1/auth/**

server:
  port: 8888